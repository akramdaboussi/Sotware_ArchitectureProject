services:

  # ── Infrastructure ──────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - archi-net

  mailhog:
    image: mailhog/mailhog
    container_name: mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - archi-net

  # ── Auth Service ─────────────────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8080:8080" # direct access for dev/debug
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_MAIL_HOST=mailhog
    depends_on:
      - rabbitmq
      - mailhog
    networks:
      - archi-net

  # ── Service A ────────────────────────────────────────────────────────────
  service-a:
    build:
      context: ../services/service-a
      dockerfile: Dockerfile
    container_name: service-a
    expose:
      - "8080" # only reachable from Nginx inside Docker
    networks:
      - archi-net

  # ── Service B ────────────────────────────────────────────────────────────
  service-b:
    build:
      context: ../services/service-b
      dockerfile: Dockerfile
    container_name: service-b
    expose:
      - "8080"
    networks:
      - archi-net

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - service-a
      - service-b
    networks:
      - archi-net

networks:
  archi-net:
    driver: bridge
