worker_processes 1;

events { worker_connections 1024; }

http {
    # ── Upstream definitions use Docker service names ──────────────────────
    upstream auth-cluster  { server auth-service:8080; }
    upstream service-a-cluster { server service-a:8080; }
    upstream service-b-cluster { server service-b:8080; }

    server {
        listen 80;

        # ── Internal subrequest: JWT validation via Auth /validate ──────────
        location = /_auth {
            internal;
            proxy_pass              http://auth-cluster/validate;
            proxy_pass_request_body off;
            proxy_set_header        Content-Length "";
            # Forward the client's Bearer token
            proxy_set_header        Authorization $http_authorization;
            # Tell Auth which service is being accessed
            proxy_set_header        X-Target-Service $target_service;
        }

        # ── Uniform 403 response ────────────────────────────────────────────
        location = /_forbidden {
            internal;
            return 403;
        }

        # ── Service A – requires valid JWT ──────────────────────────────────
        location /a/ {
            if ($http_authorization = "") { return 403; }

            set $target_service "A";
            auth_request /_auth;

            error_page 401 =403 /_forbidden;
            error_page 403 =    /_forbidden;

            # Forward the Authorization header so Service A can read user info if needed
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://service-a-cluster;
        }

        # ── Service B – requires valid JWT ──────────────────────────────────
        location /b/ {
            if ($http_authorization = "") { return 403; }

            set $target_service "B";
            auth_request /_auth;

            error_page 401 =403 /_forbidden;
            error_page 403 =    /_forbidden;

            proxy_set_header Authorization $http_authorization;
            proxy_pass http://service-b-cluster;
        }

        # ── Auth public endpoints ───────────────────────────────────────────
        location /api/auth/ {
            proxy_pass http://auth-cluster;
            proxy_set_header Host $host;
        }

        # ── Nginx public validate_email route (per spec) ────────────────────
        location = /validate_email {
            proxy_pass http://auth-cluster/validate_email;
        }

        # ── Serve the Auth service frontend (HTML/CSS/JS) ───────────────────
        location / {
            proxy_pass http://auth-cluster;
            proxy_set_header Host $host;
        }
    }
}