spring.application.name=archi

# Configuration de la base de données H2
spring.datasource.url=jdbc:h2:file:./data/authdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Configuration JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Console H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT secret (clé 256 bits, base64) - À CONFIGURER VIA VARIABLE D'ENVIRONNEMENT EN PRODUCTION
jwt.secret=${JWT_SECRET:VGhpcy1pcy1hLXN1cGVyLXNlY3JldC1leGFtcGxlLWtleS1mb3ItanVzdC1mb3ItZGVtbw==}

# Identifiants admin par défaut - À CONFIGURER VIA VARIABLES D'ENVIRONNEMENT EN PRODUCTION
app.admin.email=${ADMIN_EMAIL:admin@admin.com}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Niveau de log pour debug complet (affiche tout, y compris hash password)
logging.level.com.softwarearchi.archi=DEBUG

# Configuration RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Paramètres MQ de l'application
app.mq.exchange=auth.events
app.mq.rk.userRegistered=auth.user-registered
app.mq.rk.emailVerified=auth.email-verified

# Configuration Mail (MailHog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
